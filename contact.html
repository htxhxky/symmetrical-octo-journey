<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言板 - 个人网站</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">个人网站</a>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="about.html">关于我</a>
                <a href="douyin.html">抖音账号</a>
                <a href="hobbies.html">个人爱好</a>
                <a href="projects.html">项目展示</a>
                <a href="contact.html">留言板</a>
            </div>
        </div>
    </nav>

    <!-- 留言板页面 -->
    <section class="contact-section">
        <div class="container">
            <h2>留言板</h2>
            
            <div class="contact-form">
                <h3>留下你的留言</h3>
                <form id="message-form">
                    <div class="form-group">
                        <label for="name">姓名</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">邮箱</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="message">留言内容</label>
                        <textarea id="message" name="message" required></textarea>
                    </div>
                    <button type="submit" class="btn">提交留言</button>
                </form>
            </div>

            <div class="message-list" id="message-list">
                <h3>留言列表</h3>
                <!-- 留言将通过JavaScript动态添加 -->
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 个人网站. 保留所有权利.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
